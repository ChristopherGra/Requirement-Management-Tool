# ============================================================
# Requirements Tracer — Configuration File
# ============================================================
#
# This config reproduces the requirements tracing for software development.
# Paths are resolved relative to this config file's directory.
#
# Source format:  label = filepath [:: sheet_name]
#   - Use :: to specify a sheet within a multi-sheet xlsx.
#   - Omit :: to load the first (or only) sheet.
#   - Separate xlsx files also work (one source per file).
#
# All input files must follow the 18-column DOORS schema:
#   ParentID, RequirementID, Type, SubType, Title, Definition,
#   Notes, Remarks, Responsibility, SubSysApplicability,
#   Applicability, Compliance, ComplianceNotes, Verification,
#   VerificationNotes, ReferenceDocument, OriginalESAIdentifier,
#   UpdatesMade

[general]
output_dir = output
debug = true

[sources]
# Combined xlsx — each sheet is a separate source
Level 1 Req = requirement_documents/Tracing_Examples/Level1Reqs.xlsx
Level 2 Req = requirement_documents/Tracing_Examples/Level2Reqs.xlsx
Level 3 Req = requirement_documents/Tracing_Examples/Level3Reqs.csv
Level 4 Req = requirement_documents/Tracing_Examples/Level4Reqs.xlsx


[hierarchy]
# Ordered from most abstract (top) to most derived (bottom).
# Each label must match a key in [sources].
order = Level 1 Req, Level 2 Req, Level 3 Req, Level 4 Req

[extra_links]
# Requirements that link across hierarchy levels (non-linear parents).
# Loaded *after* the main hierarchy is built.
Level 5 Req = requirement_documents/Tracing_Examples/Level5Reqs.xlsx

[export]
ancestry_xlsx = example_ancestry.xlsx
